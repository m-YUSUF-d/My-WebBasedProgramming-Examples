<html>
    <!--create table-->
    <table border="3">
        <tr>
            <td>1. satır 1. sütun</td>
            <td>1. satır 2. sütun</td>
        </tr>
        <tr>
            <td>2. satır 1. sütun</td>
            <td>2. satır 2. sütun</td>
        </tr>
    </table>

    <!--table header <th>-->
    <table border="3">
        <tr>
            <th>Name</th>
            <th>Surname</th>
        </tr>
        <tr>
            <td>Yusuf</td>
            <td>Daşdemir</td>
        </tr>
        <tr>
            <td>Ahmet</td>
            <td>Buz</td>
        </tr>
    </table>

    <!--cellpadding and cellspacing-->
    <table border="3" cellpadding="10" cellspacing="5">
        <tr>
            <td>1. row 1. column</td>
            <td>1. row 2. column</td>
        </tr>
        <tr>
            <td>2. row 1. column</td>
            <td>2. row 2. column</td>
        </tr>
    </table>

    <!--colspan and rowspan-->
    <table border="3">
        <tr>
            <td colspan="2">1. satır 1. sütun (2 sütun kaplar)</td>
        </tr>
        <tr>
            <td>2. row 1. column</td>
            <td>2. row 2. column</td>
        </tr>
    </table>

</html>
