<!DOCTYPE html>
<html>

<head>
    <!--user can't see inside head tags on the page-->
    <title>Html Page</title>

    <!--meta tags-->
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a simple HTML page">
    <meta name="keywords" content="HTML, CSS, JavaScript">
</head>

<body>
    <!--create a simple html page-->
    <h1>Welcome to my website</h1>
    <hr>    
    <p>This is the entrance page of my website. Please click the button below to enter.</p>
    <p style="color: red; font-size: 20px;">Note: This is a simple HTML page for demonstration purposes.</p>
    <p style="color: blue; font-weight: bold; font-family: Arial, sans-serif;">Click the button to proceed:</p>
    <button onclick="enter()">Enter</button>
    <br>
</body>

</html>
