<html>

<head>
    <!--CSS codes write between style tags-->
    <style type="text/css">
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        h1,
        h2 {
            font-style: italic;
            color: #a3a900;
            font-weight: bold;
            letter-spacing: 7px;
            text-transform: uppercase;
        }

        .green-text {
            color: green;
            font-weight: normal;
        }

        /*link colors*/
        a:link {
            color: rgb(0, 255, 255)
        }

        a:visited {
            color: rgb(255, 0, 0)
        }

        a:hover {
            color: rgb(255, 255, 0)
        }

        a:active {
            color: rgb(255, 255, 255)
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Css</h1>
    <h2>CSS stands for Cascading Style Sheets. It is used to style and layout web pages.</h2>
    <h3 class="green-text">This is an example of a simple HTML page with some styling.</h3>
    <p>CSS allows you to control the color, font, size, spacing, and many other aspects of your web page's appearance.
    </p>

    <a style="font-weight: bold;" href="https://www.w3schools.com/css/default.asp">Learn more about CSS</a>
</body>

</html>
